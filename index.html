<style>

/*------------------------------------- image button*/
.image-button {
    background-color: var(--panel);
    position: relative;
    display: inline-block;
    padding: 0px;
    margin:5px;
    cursor: pointer;
    border-radius: 15px;
    overflow:hidden;
    text-align: center;
    font-weight: bold;
    color: var(--text);
    height: 400px;
    width: 100%;
    transition: all 0.3s ease;
    border: none;
    box-shadow: var(--shadow-size) var(--shadow-color);
}

.image-button img {
    display: block;
    width: 100%;
    height: calc(100% - 45px);
    object-fit: cover;
    object-position: top;
    opacity: 0.85;
    /* filter: blur(2px); */
}

    .image-button span {
        display: block;
        position: absolute;
        bottom: 0px;
        width: 100%;
        background-color: var(--panel);
        padding: 12px 0;
        font-size: 1.2rem;
        border-top: none;
    }

    .image-button:hover {
        color: var(--text);
        transform: scale(1.015);
        box-shadow: var(--button-big-shadow-hovered) var(--shadow-color-hovered);
     }
     
     .image-button:focus {
         outline-offset: 3px;
     }

/*------------------------------------- grid container*/
    .grid-container{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    }

/*------------------------------------- hero section*/
    .hero-section {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
        margin-top: 80px;
        margin-bottom: 40px;
        padding: 0 40px;
        max-width: 1000px;
        margin-left: auto;
        margin-right: auto;
    }

    .hero-text {
        flex: 1;
        text-align: left;
        max-width: 500px;
    }

    .hero-text .title {
        font-size: 2.4em;
        margin-top: 0;
        margin-bottom: 0.5rem;
        text-align: left;
    }

    .hero-presentation {
        font-size: 1.1rem;
        line-height: 1.6;
        color: var(--text);
        margin-top: 1rem;
        margin-bottom: 0;
        text-align: left;
    }

    .hero-image {
        flex-shrink: 0;
    }
    /*------------------------------------- profile photo*/
    .profile-photo {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        object-fit: cover;
        border: none;
        box-shadow: 0 4px 16px var(--shadow-color);
        transition: all 0.3s ease;
    }

    @media (max-width: 768px) {
        .hero-section {
            flex-direction: column;
            text-align: center;
        }
        .hero-text {
            text-align: center;
        }
